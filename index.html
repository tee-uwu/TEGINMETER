<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tegin Scale ULTRA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root{
  --bg1:#0d001a;
  --bg2:#1a0033;
  --bg3:#050010;

  --panel:#1a0f2e;
  --panel2:#120824;

  --border:#b026ff;

  --pink:#b026ff;
  --cyan:#8b5cf6;

  --yellow:#e9d5ff;
  --green:#a78bfa;
  --red:#f472b6;
  --white:#f5f3ff;

  --shadow:#000;

  --bronze:#c084fc;
  --silver:#ddd6fe;
  --gold:#c084fc;
}

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:'Press Start 2P', cursive;
      color:var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,79,216,.16), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(99,243,255,.12), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(125,255,140,.08), transparent 18%),
        linear-gradient(180deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      overflow-x:hidden;
      image-rendering:pixelated;
      padding:24px;
    }

    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:4px;
      height:4px;
      background:#fff;
      opacity:.8;
      box-shadow:0 0 0 2px rgba(255,255,255,.08);
      animation:floatStar linear infinite;
    }

    @keyframes floatStar{
      from{ transform:translateY(0); opacity:.2; }
      30%{ opacity:.9; }
      to{ transform:translateY(-120vh); opacity:.1; }
    }

    .scanlines::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      background:linear-gradient(
        to bottom,
        rgba(255,255,255,.03) 0px,
        rgba(255,255,255,.03) 2px,
        rgba(0,0,0,.04) 2px,
        rgba(0,0,0,.04) 4px
      );
      background-size:100% 4px;
      mix-blend-mode:soft-light;
      opacity:.35;
    }

    .wrap{
      position:relative;
      z-index:2;
      max-width:1200px;
      margin:0 auto;
    }

    .title-box{
      border:4px solid var(--cyan);
      background:linear-gradient(180deg, #202845, #13192b);
      padding:18px 14px;
      text-align:center;
      box-shadow:8px 8px 0 var(--shadow);
      margin-bottom:20px;
    }

    h1{
      margin:0;
      font-size:clamp(18px, 2.4vw, 34px);
      line-height:1.5;
      color:var(--yellow);
      text-shadow:
        3px 3px 0 #000,
        0 0 14px rgba(255,224,102,.35);
    }

    .subtitle{
      margin-top:10px;
      font-size:10px;
      color:var(--cyan);
      line-height:1.6;
    }

    .grid{
      display:grid;
      grid-template-columns:1.2fr .9fr;
      gap:20px;
      align-items:start;
    }

    .panel{
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      border:4px solid var(--border);
      box-shadow:8px 8px 0 var(--shadow);
      padding:18px;
    }

    .section-title{
      font-size:12px;
      color:var(--pink);
      margin:0 0 18px 0;
      line-height:1.6;
    }

    .name-row{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      margin-bottom:18px;
    }

    .pixel-input{
      width:100%;
      padding:14px 12px;
      border:4px solid var(--cyan);
      background:#090d18;
      color:var(--white);
      font-family:'Press Start 2P', cursive;
      font-size:11px;
      outline:none;
      box-shadow:4px 4px 0 #000 inset;
    }

    .pixel-btn{
      padding:14px 12px;
      border:4px solid var(--pink);
      background:#140915;
      color:var(--pink);
      font-family:'Press Start 2P', cursive;
      font-size:10px;
      cursor:pointer;
      transition:transform .08s ease;
      box-shadow:4px 4px 0 #000;
    }

    .pixel-btn:hover{
      transform:translate(-1px,-1px);
    }

    .pixel-btn:active{
      transform:translate(2px,2px);
      box-shadow:2px 2px 0 #000;
    }

    .pixel-btn.alt{
      border-color:var(--yellow);
      color:var(--yellow);
      background:#181204;
    }

    .stats{
      display:grid;
      gap:16px;
    }

    .trait label{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      font-size:10px;
      color:var(--white);
      line-height:1.5;
    }

    .value-badge{
      color:var(--cyan);
    }

    input[type="range"]{
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      background:#06080f;
      border:4px solid var(--cyan);
      height:18px;
      margin:0;
      cursor:pointer;
    }

    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      appearance:none;
      width:22px;
      height:30px;
      border:4px solid #000;
      background:var(--pink);
      box-shadow:2px 2px 0 #000;
    }

    input[type="range"]::-moz-range-thumb{
      width:22px;
      height:30px;
      border:4px solid #000;
      background:var(--pink);
      box-shadow:2px 2px 0 #000;
    }

    .bar{
      height:18px;
      background:#05060a;
      border:4px solid var(--cyan);
      margin-top:8px;
      position:relative;
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0;
      background:
repeating-linear-gradient(
90deg,
#a855f7 0 14px,
#6d28d9 14px 28px
);
      transition:width .15s ease;
    }

    .hud{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:12px;
    }

    .hud-card{
      border:4px solid var(--yellow);
      background:#181409;
      padding:14px 10px;
      text-align:center;
      min-height:96px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
      box-shadow:6px 6px 0 #000;
    }

    .hud-card .k{
      color:var(--yellow);
      font-size:9px;
      line-height:1.6;
    }

    .hud-card .v{
      color:var(--white);
      font-size:14px;
      line-height:1.5;
    }

    .score-good{ color:var(--green) !important; }
    .score-mid{ color:var(--yellow) !important; }
    .score-bad{ color:var(--red) !important; }

    .right-stack{
      display:grid;
      gap:20px;
    }

    .avatar-card{
      display:grid;
      grid-template-columns:140px 1fr;
      gap:16px;
      align-items:center;
    }

    .avatar-box{
      border:4px solid var(--pink);
      background:#0b0710;
      padding:10px;
      box-shadow:6px 6px 0 #000;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #avatar{
      width:96px;
      height:96px;
      image-rendering:pixelated;
      border:4px solid #000;
      background:#111;
    }

    .rank-box{
      border:4px solid var(--green);
      background:#08120c;
      padding:12px;
      box-shadow:6px 6px 0 #000;
    }

    .rank-title{
      color:var(--green);
      font-size:10px;
      margin-bottom:10px;
      line-height:1.6;
    }

    .rank-value{
      font-size:16px;
      line-height:1.7;
    }

    .flavor{
      margin-top:10px;
      font-size:9px;
      color:var(--cyan);
      line-height:1.8;
    }

    .chart-wrap{
      border:4px solid var(--cyan);
      background:#0a1020;
      padding:12px;
      box-shadow:6px 6px 0 #000;
    }

    .chart-title{
      color:var(--cyan);
      font-size:10px;
      margin-bottom:12px;
      line-height:1.6;
    }

    canvas{
      width:100%;
      display:block;
    }

    .leaderboard-panel{
      margin-top:20px;
    }

    .leaderboard-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .leaderboard{
      display:grid;
      gap:10px;
    }

    .player{
      border:4px solid var(--cyan);
      background:#0b1120;
      box-shadow:6px 6px 0 #000;
      padding:12px;
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:12px;
      align-items:center;
    }

    .medal{
      width:46px;
      height:46px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      border:4px solid #000;
      background:#222;
    }

    .medal.gold{
      background:var(--gold);
      color:#000;
    }

    .medal.silver{
      background:var(--silver);
      color:#000;
    }

    .medal.bronze{
      background:var(--bronze);
      color:#000;
    }

    .medal.normal{
      background:#1a1a1a;
      color:var(--cyan);
    }

    .player-main{
      min-width:0;
    }

    .player-name{
      font-size:11px;
      line-height:1.6;
      color:var(--white);
      word-break:break-word;
    }

    .player-sub{
      margin-top:8px;
      font-size:8px;
      line-height:1.8;
      color:var(--cyan);
    }

    .player-score{
      text-align:right;
      font-size:12px;
      line-height:1.6;
      color:var(--yellow);
    }

    .top-player{
      border-color:var(--yellow);
      background:linear-gradient(180deg, rgba(255,213,74,.12), rgba(11,17,32,1));
      box-shadow:
        6px 6px 0 #000,
        0 0 20px rgba(255,213,74,.22);
    }

    .footer-note{
      margin-top:14px;
      color:#9db7ff;
      font-size:8px;
      line-height:1.8;
      text-align:center;
    }

    @media (max-width: 980px){
      .grid{
        grid-template-columns:1fr;
      }

      .avatar-card{
        grid-template-columns:1fr;
      }

      .avatar-box{
        justify-self:center;
      }
    }

    @media (max-width: 640px){
      body{
        padding:14px;
      }

      .panel{
        padding:14px;
      }

      .name-row{
        grid-template-columns:1fr;
      }

      .hud{
        grid-template-columns:1fr;
      }

      .player{
        grid-template-columns:auto 1fr;
      }

      .player-score{
        grid-column:1 / -1;
        text-align:left;
        padding-left:58px;
      }

      .subtitle{
        font-size:9px;
      }
    }
  </style>
</head>
<body class="scanlines">
  <div class="bg" id="bg"></div>

  <div class="wrap">
    <div class="title-box">
      <h1>🔥 TEGIN SCALE ULTRA 🔥</h1>
      <div class="subtitle">RETRO CHARACTER ANALYZER // INDIE GAME EDITION</div>
    </div>

    <div class="grid">
      <section class="panel">
        <h2 class="section-title">PLAYER BUILD CONFIG</h2>

        <div class="name-row">
          <input id="name" class="pixel-input" type="text" placeholder="ENTER PLAYER NAME">
          <button class="pixel-btn alt" id="randomizeBtn" type="button">RANDOM</button>
          <button class="pixel-btn" id="resetBtn" type="button">RESET</button>
        </div>

        <div style="margin-bottom:18px;">
          <input id="variant" class="pixel-input" type="text" placeholder="COMMENT / FEATURE (ex: Singer)">
        </div>

        <div class="stats">
          <div class="trait">
            <label>
              <span>DEEPVOICE</span>
              <span class="value-badge" id="deepvoiceValue">5</span>
            </label>
            <input class="slider" type="range" min="1" max="10" value="5" id="deepvoice" oninput="updateBars('deepvoice')">
            <div class="bar"><div class="fill" id="deepvoiceBar"></div></div>
          </div>

          <div class="trait">
            <label>
              <span>FLEX</span>
              <span class="value-badge" id="flexValue">5</span>
            </label>
            <input class="slider" type="range" min="1" max="10" value="5" id="flex" oninput="updateBars('flex')">
            <div class="bar"><div class="fill" id="flexBar"></div></div>
          </div>

          <div class="trait">
            <label>
              <span>ENGLISH LINGO</span>
              <span class="value-badge" id="lingoValue">5</span>
            </label>
            <input class="slider" type="range" min="1" max="10" value="5" id="lingo" oninput="updateBars('lingo')">
            <div class="bar"><div class="fill" id="lingoBar"></div></div>
          </div>

          <div class="trait">
            <label>
              <span>ANNOYANCE</span>
              <span class="value-badge" id="annoyanceValue">5</span>
            </label>
            <input class="slider" type="range" min="1" max="10" value="5" id="annoyance" oninput="updateBars('annoyance')">
            <div class="bar"><div class="fill" id="annoyanceBar"></div></div>
          </div>
        </div>

        <div class="hud">
          <div class="hud-card">
            <div class="k">% TEGIN</div>
            <div class="v score-good" id="scoreDisplay">50% TEGIN</div>
          </div>
          <div class="hud-card">
            <div class="k">AI JUDGE</div>
            <div class="v" id="aiJudge">BALANCED MENACE</div>
          </div>
        </div>

        <div style="margin-top:18px; display:flex; gap:12px; flex-wrap:wrap;">
          <button class="pixel-btn" id="addPlayerBtn" type="button">ADD TO LEADERBOARD</button>
          <button class="pixel-btn alt" id="clearBoardBtn" type="button">CLEAR BOARD</button>
        </div>
      </section>

      <section class="right-stack">
        <div class="panel avatar-card">
          <div class="avatar-box">
            <canvas id="avatar" width="96" height="96"></canvas>
          </div>

          <div>
            <div class="rank-box">
              <div class="rank-title">CURRENT CLASS</div>
              <div class="rank-value" id="rankValue">NPC BOSS</div>
              <div class="flavor" id="flavorText">voice heavy build with suspicious aura</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="chart-wrap">
            <div class="chart-title">STAT RADAR</div>
            <canvas id="radarChart" width="420" height="320"></canvas>
          </div>
        </div>
      </section>
    </div>

    <section class="panel leaderboard-panel">
      <div class="leaderboard-head">
        <h2 class="section-title" style="margin:0;">🏆 PLAYER RANKINGS</h2>
      </div>
      <div class="leaderboard" id="players"></div>
      <div class="footer-note">DATA SAVED LOCALLY // NO INTERNET // PURE PIXEL MADNESS</div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "teginPlayersUltra";

    const nameInput = document.getElementById("name");
    const variantInput = document.getElementById("variant");
    const deepvoiceInput = document.getElementById("deepvoice");
    const flexInput = document.getElementById("flex");
    const lingoInput = document.getElementById("lingo");
    const annoyanceInput = document.getElementById("annoyance");

    const deepvoiceBar = document.getElementById("deepvoiceBar");
    const flexBar = document.getElementById("flexBar");
    const lingoBar = document.getElementById("lingoBar");
    const annoyanceBar = document.getElementById("annoyanceBar");

    const deepvoiceValue = document.getElementById("deepvoiceValue");
    const flexValue = document.getElementById("flexValue");
    const lingoValue = document.getElementById("lingoValue");
    const annoyanceValue = document.getElementById("annoyanceValue");

    const scoreDisplay = document.getElementById("scoreDisplay");
    const aiJudge = document.getElementById("aiJudge");
    const rankValue = document.getElementById("rankValue");
    const flavorText = document.getElementById("flavorText");
    const playersDiv = document.getElementById("players");

    const randomizeBtn = document.getElementById("randomizeBtn");
    const resetBtn = document.getElementById("resetBtn");
    const addPlayerBtn = document.getElementById("addPlayerBtn");
    const clearBoardBtn = document.getElementById("clearBoardBtn");

    const radarCanvas = document.getElementById("radarChart");
    const radarCtx = radarCanvas.getContext("2d");

    const avatarCanvas = document.getElementById("avatar");
    const avatarCtx = avatarCanvas.getContext("2d");

    const maxScore = (10 * 1.3) + (10 * 1.2) + (10 * 1.1) + (10 * 0.8);

    let players = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function getStats(){
      return {
        deepvoice: +deepvoiceInput.value,
        flex: +flexInput.value,
        lingo: +lingoInput.value,
        annoyance: +annoyanceInput.value
      };
    }


    function calcTeginScore(stats){
      return (
        stats.deepvoice * 1.3 +
        stats.flex * 1.2 +
        stats.lingo * 1.1 +
        stats.annoyance * 0.8
      );
    }

    function getAiJudge(stats, score){
      const maxStat = Math.max(stats.deepvoice, stats.flex, stats.lingo, stats.annoyance);

      if(stats.deepvoice >= 8 && stats.flex >= 6) return "BASS CANNON";
      if(stats.flex >= 8 && stats.annoyance <= 4) return "MAIN CHARACTER";
      if(stats.lingo >= 8) return "DUOLINGO WARLORD";
      if(stats.annoyance >= 8) return "CHAOS GREMLIN";
      if(score >= 34) return "CUTSCENE THREAT";
      if(maxStat <= 6) return "BALANCED MENACE";
      return "UNSTABLE BUILD";
    }

    function getRank(score){
      if(score >= 39) return "FINAL BOSS";
      if(score >= 34) return "NPC BOSS";
      if(score >= 29) return "ELITE UNIT";
      if(score >= 24) return "SIDE QUEST KING";
      if(score >= 19) return "LOUD CITIZEN";
      return "BACKGROUND NPC";
    }

    function getFlavor(stats){
      if(stats.deepvoice > stats.flex && stats.deepvoice > stats.lingo && stats.deepvoice > stats.annoyance){
        return "voice heavy build with suspicious aura";
      }
      if(stats.flex > stats.deepvoice && stats.flex > stats.lingo && stats.flex > stats.annoyance){
        return "swagger maxed, accountability optional";
      }
      if(stats.lingo > stats.deepvoice && stats.lingo > stats.flex && stats.lingo > stats.annoyance){
        return "talks in patches, updates and buzzwords";
      }
      if(stats.annoyance > stats.deepvoice && stats.annoyance > stats.flex && stats.annoyance > stats.lingo){
        return "combat type: psychological damage";
      }
      return "all stats distributed for peak confusion";
    }

    function scoreColorClass(percent){
      if(percent >= 75) return "score-good";
      if(percent >= 50) return "score-mid";
      return "score-bad";
    }


    function updateBars(){
      const stats = getStats();
      const score = calcTeginScore(stats);
      const percentTegin = (score / maxScore) * 100;
      const judge = getAiJudge(stats, score);
      const rank = getRank(score);
      const flavor = getFlavor(stats);

      deepvoiceBar.style.width = (stats.deepvoice * 10) + "%";
      flexBar.style.width = (stats.flex * 10) + "%";
      lingoBar.style.width = (stats.lingo * 10) + "%";
      annoyanceBar.style.width = (stats.annoyance * 10) + "%";

      deepvoiceValue.textContent = stats.deepvoice;
      flexValue.textContent = stats.flex;
      lingoValue.textContent = stats.lingo;
      annoyanceValue.textContent = stats.annoyance;

      scoreDisplay.textContent = Math.round(percentTegin) + "% TEGIN";
      scoreDisplay.className = "v " + scoreColorClass(percentTegin);
      aiJudge.textContent = judge;
      rankValue.textContent = rank;
      flavorText.textContent = flavor;

      drawRadar(stats);
      drawAvatar(stats);
    }

    function randomizeStats(){
      deepvoiceInput.value = 1 + Math.floor(Math.random() * 10);
      flexInput.value = 1 + Math.floor(Math.random() * 10);
      lingoInput.value = 1 + Math.floor(Math.random() * 10);
      annoyanceInput.value = 1 + Math.floor(Math.random() * 10);

      updateBars();
    }

    function resetStats(){
      deepvoiceInput.value = 5;
      flexInput.value = 5;
      lingoInput.value = 5;
      annoyanceInput.value = 5;
      nameInput.value = "";
      variantInput.value = "";
      updateBars();
    }

    function medalForIndex(i){
      if(i === 0) return { icon:"🥇", className:"gold" };
      if(i === 1) return { icon:"🥈", className:"silver" };
      if(i === 2) return { icon:"🥉", className:"bronze" };
      return { icon:"#"+(i+1), className:"normal" };
    }

    function addPlayer(){
      const baseName = nameInput.value.trim();
      const comment = variantInput.value.trim();

      if(!baseName){
        alert("ENTER PLAYER NAME");
        return;
      }

      const fullName = comment
        ? baseName + " - " + comment + " Variant"
        : baseName;

      const stats = getStats();
      const score = calcTeginScore(stats);
      const percentTegin = (score / maxScore) * 100;

      players.push({
        name: fullName,
        percent: +percentTegin.toFixed(1),
        rank: getRank(score),
        judge: getAiJudge(stats, score),
        stats
      });

      players.sort((a,b) => b.percent - a.percent);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
      renderPlayers();
    }

    function clearBoard(){
      const ok = confirm("CLEAR THE LEADERBOARD?");
      if(!ok) return;
      players = [];
      localStorage.removeItem(STORAGE_KEY);
      renderPlayers();
    }

    function renderPlayers(){
      if(players.length === 0){
        playersDiv.innerHTML = `
          <div class="player">
            <div class="medal normal">?</div>
            <div class="player-main">
              <div class="player-name">NO PLAYERS YET</div>
              <div class="player-sub">add a build to start the ranking war</div>
            </div>
            <div class="player-score">0% TEGIN</div>
          </div>
        `;
        return;
      }

      playersDiv.innerHTML = players.map((p,i) => {
        const medal = medalForIndex(i);
        const extra = i === 0 ? " top-player" : "";
        return `
          <div class="player${extra}">
            <div class="medal ${medal.className}">${medal.icon}</div>
            <div class="player-main">
              <div class="player-name">${escapeHtml(p.name)}</div>
              <div class="player-sub">
                ${p.rank} // ${p.judge}
                <br>
                DV ${p.stats.deepvoice} | FX ${p.stats.flex} | LG ${p.stats.lingo} | AN ${p.stats.annoyance}
              </div>
            </div>
            <div class="player-score">${Math.round(p.percent)}% TEGIN</div>
          </div>
        `;
      }).join("");
    }

    function escapeHtml(str){
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function drawRadar(stats){
      const ctx = radarCtx;
      const w = radarCanvas.width;
      const h = radarCanvas.height;
      const cx = w / 2;
      const cy = h / 2 + 10;
      const radius = 105;
      const labels = ["DEEPVOICE", "FLEX", "LINGO", "ANNOY"];
      const values = [stats.deepvoice, stats.flex, stats.lingo, stats.annoyance];
      const angles = [
        -Math.PI / 2,
        0,
        Math.PI / 2,
        Math.PI
      ];

      ctx.clearRect(0,0,w,h);
      ctx.imageSmoothingEnabled = false;

      for(let ring=1; ring<=5; ring++){
        const r = radius * (ring / 5);
        ctx.beginPath();
        angles.forEach((a, i) => {
          const x = cx + Math.cos(a) * r;
          const y = cy + Math.sin(a) * r;
          if(i===0) ctx.moveTo(x,y);
          else ctx.lineTo(x,y);
        });
        ctx.closePath();
        ctx.strokeStyle = ring === 5 ? "#7ef9ff" : "rgba(126,249,255,0.25)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      angles.forEach((a) => {
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
        ctx.strokeStyle = "rgba(255,255,255,0.18)";
        ctx.lineWidth = 2;
        ctx.stroke();
      });

      ctx.beginPath();
      values.forEach((v, i) => {
        const r = radius * (v / 10);
        const x = cx + Math.cos(angles[i]) * r;
        const y = cy + Math.sin(angles[i]) * r;
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      });
      ctx.closePath();
      ctx.fillStyle = "rgba(255,79,216,0.35)";
      ctx.strokeStyle = "#63f3ff";
      ctx.lineWidth = 4;
      ctx.fill();
      ctx.stroke();

      values.forEach((v, i) => {
        const r = radius * (v / 10);
        const x = cx + Math.cos(angles[i]) * r;
        const y = cy + Math.sin(angles[i]) * r;

        ctx.fillStyle = "#ffe066";
        ctx.fillRect(x - 5, y - 5, 10, 10);
      });

      ctx.fillStyle = "#f6f7fb";
      ctx.font = "12px 'Press Start 2P'";
      ctx.textAlign = "center";

      ctx.fillText(labels[0], cx, cy - radius - 20);
      ctx.fillText(labels[1], cx + radius + 55, cy + 4);
      ctx.fillText(labels[2], cx, cy + radius + 28);
      ctx.fillText(labels[3], cx - radius - 55, cy + 4);
    }

    function drawAvatar(stats){
      const ctx = avatarCtx;
      const s = 8;
      ctx.clearRect(0,0,96,96);
      ctx.imageSmoothingEnabled = false;

      function px(x,y,color){
        ctx.fillStyle = color;
        ctx.fillRect(x*s,y*s,s,s);
      }

      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(0,0,96,96);

      const skin = stats.annoyance >= 6 ? "#ffd0b3" : "#f1c27d";
      const hair = stats.deepvoice >= 6 ? "#1a1a1a" : "#6b3f1f";
      const visor = stats.lingo >= 5 ? "#63f3ff" : "#ff4fd8";
      const shirt = stats.flex >= 6 ? "#ffe066" : "#7ef9ff";

      for(let y=2; y<=8; y++){
        for(let x=2; x<=8; x++){
          px(x,y,skin);
        }
      }

      for(let x=2; x<=8; x++){
        px(x,2,hair);
      }
      for(let x=1; x<=9; x++){
        px(x,1,hair);
      }
      px(1,2,hair);
      px(9,2,hair);

      px(3,4,"#111");
      px(7,4,"#111");

      if(stats.lingo >= 5){
        for(let x=2; x<=8; x++) px(x,4,visor);
      }

      if(stats.deepvoice >= 5){
        px(4,6,"#3a2414");
        px(5,6,"#3a2414");
        px(6,6,"#3a2414");
      }else{
        px(4,6,"#ad5f45");
        px(5,6,"#ad5f45");
        px(6,6,"#ad5f45");
      }

      for(let x=3; x<=7; x++){
        px(x,9,shirt);
        px(x,10,shirt);
      }
      px(2,10,shirt);
      px(8,10,shirt);

      if(stats.flex >= 6){
        px(2,9,shirt);
        px(8,9,shirt);
      }

      if(stats.annoyance >= 8){
        px(8,3,"#ff0000");
      }

      ctx.strokeStyle = "#000";
      ctx.lineWidth = 4;
      ctx.strokeRect(0,0,96,96);
    }

    function spawnStars(){
      const bg = document.getElementById("bg");
      for(let i=0; i<45; i++){
        const star = document.createElement("div");
        star.className = "star";
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = (60 + Math.random() * 60) + "vh";
        const size = Math.random() > 0.75 ? 6 : 4;
        star.style.width = size + "px";
        star.style.height = size + "px";
        star.style.animationDuration = (10 + Math.random() * 16) + "s";
        star.style.animationDelay = (-Math.random() * 18) + "s";
        bg.appendChild(star);
      }
    }

    randomizeBtn.addEventListener("click", randomizeStats);
    resetBtn.addEventListener("click", resetStats);
    addPlayerBtn.addEventListener("click", addPlayer);
    clearBoardBtn.addEventListener("click", clearBoard);

    spawnStars();
    updateBars();
    renderPlayers();
  </script>
</body>
